services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: 1000
        GID: 1000

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./src:/var/www

    networks:
      - lg-network

  nginx:
    image: nginx:stable-alpine

    restart: unless-stopped

    ports:
      - "${NGINX_PORT}:80"

    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - php

    networks:
      - lg-network

  mysql:
    image: mysql:8.0

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    command:
      --default-authentication-plugin=mysql_native_password

    ports:
      - "${MYSQL_PORT}:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - lg-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

    ports:
      - "${PHPMYADMIN_PORT}:80"

    networks:
      - lg-network

volumes:
  mysql_data:

networks:
  lg-network:
    driver: bridge